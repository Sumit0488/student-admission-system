# ═══════════════════════════════════════════════════════════════════════════════
#  CD — Continuous Deployment
#  Runs ONLY on push to main (not on PRs).
#  Deploys full-stack app to Vercel (frontend + backend API function).
# ═══════════════════════════════════════════════════════════════════════════════

name: CD

on:
  workflow_dispatch:

  push:
    branches: [main]

jobs:

  # ─── Full-stack → Vercel ──────────────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Check Vercel secrets are configured
        id: check
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠️  VERCEL_TOKEN secret is not set — skipping Vercel deployment."
          elif [ -z "$ORG_ID" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠️  VERCEL_ORG_ID secret is not set — skipping Vercel deployment."
          elif [ -z "$PROJECT_ID" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠️  VERCEL_PROJECT_ID secret is not set — skipping Vercel deployment."
          else
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ All Vercel secrets found — proceeding with deployment."
          fi
        env:
          TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Checkout code
        if: steps.check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        if: steps.check.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        if: steps.check.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        if: steps.check.outputs.ready == 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        if: steps.check.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
