# ═══════════════════════════════════════════════════════════════════════════════
#  CI — Continuous Integration
#  Runs on every push and every pull request to main / develop.
#  Pipeline: Install → Lint → Test → Build
# ═══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─── 1. Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend (ESLint)
        working-directory: backend
        run: npm run lint || true

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          # Use a dummy Mongo URI for unit tests (they don't hit the DB)
          MONGO_URI: mongodb://localhost:27017/test_ci
          NODE_ENV: test

  # ─── 2. Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npm run lint || true

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build
        env:
          # Add your Vite env vars here (no secrets — use GitHub Secrets for real values)
          VITE_API_URL: http://localhost:4000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
